<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio - Clube Duratex</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --azul-duratex: #1d438a;
            --azul-claro: #3b5998;
            --azul-hover: #15326a;
            --branco: #ffffff;
            --cinza-bg: #f8fafc;
            --gradiente: linear-gradient(135deg, #1d438a 0%, #0a1931 100%);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--gradiente);
            overflow-x: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .config-max {
            position: absolute;
            top: 20px;
            right: 25px;
            text-align: right;
        }

        .config-max label {
            display: block;
            font-size: 0.6rem;
            font-weight: 800;
            color: #a0aec0;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .config-max input {
            width: 65px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 5px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: var(--azul-duratex);
            background: var(--cinza-bg);
            outline: none;
        }

        .logo {
            width: 180px;
            margin-bottom: 5px;
        }

        .resultado-container {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        #resultado {
            font-size: 7.5rem;
            font-weight: 900;
            color: var(--azul-duratex);
            margin: 0;
            line-height: 1;
        }

        .botoes-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .botao-sortear {
            background-color: var(--azul-duratex);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(29, 67, 138, 0.2);
        }

        .botao-sortear:hover:not(:disabled) {
            background-color: var(--azul-hover);
            transform: translateY(-2px);
        }

        /* Botão para abrir o site externo */
        .botao-clube {
            background-color: transparent;
            color: var(--azul-duratex);
            border: 2px solid var(--azul-duratex);
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
        }

        .botao-clube:hover {
            background-color: rgba(29, 67, 138, 0.05);
            border-color: var(--azul-hover);
            color: var(--azul-hover);
        }

        .botao-sortear:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
        }

        .historico-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #edf2f7;
        }

        .historico-titulo {
            font-size: 0.7rem;
            font-weight: 800;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        #lista-historico {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px;
        }

        .num-historico {
            background: var(--azul-duratex);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            0% { transform: translateY(10px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(0.4); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .ganhou { animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .footer-tag {
            margin-top: 25px;
            font-size: 0.6rem;
            color: #cbd5e0;
            font-weight: 600;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="config-max">
            <label for="max">Até</label>
            <input type="number" id="max" value="100" min="2">
        </div>

        <img src="https://app.clubeduratex.com.br/assets/logo.9e404db0.svg" alt="Clube Duratex" class="logo">
        
        <div class="resultado-container">
            <div id="resultado">--</div>
        </div>

        <div class="botoes-container">
            <button class="botao-sortear" id="btnSortear">SORTEAR</button>
            <a href="http://app.clubeduratex.com.br/login" target="_blank" class="botao-clube">CONFERIR NO CLUBE</a>
        </div>

        <div class="historico-section" id="historico-container" style="display: none;">
            <span class="historico-titulo">Últimos Sorteados</span>
            <div id="lista-historico"></div>
        </div>

        <div class="footer-tag">CLUBE DURATEX • SORTEADOR OFICIAL</div>
    </div>

    <script>
        const botao = document.getElementById('btnSortear');
        const display = document.getElementById('resultado');
        const inputMax = document.getElementById('max');
        const listaHistorico = document.getElementById('lista-historico');
        const historicoContainer = document.getElementById('historico-container');

        function lancarConfetes() {
            confetti({
                particleCount: 120,
                spread: 60,
                origin: { y: 0.7 },
                colors: ['#1d438a', '#3b5998', '#ffffff']
            });
        }

        function atualizarHistorico(numero) {
            historicoContainer.style.display = 'block';
            const item = document.createElement('div');
            item.className = 'num-historico';
            item.innerText = numero;
            listaHistorico.prepend(item);
        }

        function sortear() {
            const max = parseInt(inputMax.value) || 100;

            if (max <= 1) {
                alert("O valor máximo precisa ser maior que 1.");
                return;
            }

            botao.disabled = true;
            botao.innerText = "SORTEANDO...";
            display.classList.remove('ganhou');

            let contador = 0;
            const totalGiros = 20;
            
            const intervalo = setInterval(() => {
                const numTemp = Math.floor(Math.random() * max) + 1;
                display.innerText = numTemp;
                contador++;

                if (contador >= totalGiros) {
                    clearInterval(intervalo);
                    const numFinal = Math.floor(Math.random() * max) + 1;
                    display.innerText = numFinal;
                    display.classList.add('ganhou');
                    lancarConfetes();
                    atualizarHistorico(numFinal);

                    botao.disabled = false;
                    botao.innerText = "SORTEAR NOVAMENTE";
                }
            }, 60);
        }

        botao.addEventListener('click', sortear);
    </script>

</body>
</html>
